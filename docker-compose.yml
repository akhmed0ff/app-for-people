name: ${COMPOSE_PROJECT_NAME:-taxi_platform}

x-backend-env: &backend-env
  NODE_ENV: production
  PORT: 3000
  API_PREFIX: api/v1
  DATABASE_URL: ${DATABASE_URL:-postgresql://taxi:taxi_password@postgres:5432/taxi?schema=public}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-replace-with-long-random-secret}
  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-replace-with-another-long-random-secret}
  JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
  JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
  DEV_LOGIN_ENABLED: ${DEV_LOGIN_ENABLED:-false}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001,http://localhost:8081,http://localhost:8082}
  MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN:-replace-with-mapbox-token}
  LOG_LEVEL: ${LOG_LEVEL:-info}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-taxi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taxi_password}
      POSTGRES_DB: ${POSTGRES_DB:-taxi}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taxi} -d ${POSTGRES_DB:-taxi}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - taxi-private

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - taxi-private

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runner
    restart: unless-stopped
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *backend-env
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - taxi-public
      - taxi-private

  admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
      target: runner
    restart: unless-stopped
    init: true
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/api/v1}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:3000/taxi}
      NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN:-replace-with-mapbox-token}
    ports:
      - "${ADMIN_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - taxi-public

  customer:
    build:
      context: .
      dockerfile: customer/Dockerfile
      target: runner
    restart: unless-stopped
    init: true
    depends_on:
      backend:
        condition: service_healthy
    environment:
      EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL:-http://localhost:3000/api/v1}
      EXPO_PUBLIC_SOCKET_URL: ${EXPO_PUBLIC_SOCKET_URL:-http://localhost:3000/taxi}
      EXPO_PUBLIC_MAPBOX_ACCESS_TOKEN: ${EXPO_PUBLIC_MAPBOX_ACCESS_TOKEN:-replace-with-mapbox-token}
    ports:
      - "${CUSTOMER_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - taxi-public

  driver:
    build:
      context: .
      dockerfile: driver/Dockerfile
      target: runner
    restart: unless-stopped
    init: true
    depends_on:
      backend:
        condition: service_healthy
    environment:
      EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL:-http://localhost:3000/api/v1}
      EXPO_PUBLIC_SOCKET_URL: ${EXPO_PUBLIC_SOCKET_URL:-http://localhost:3000/taxi}
      EXPO_PUBLIC_MAPBOX_ACCESS_TOKEN: ${EXPO_PUBLIC_MAPBOX_ACCESS_TOKEN:-replace-with-mapbox-token}
    ports:
      - "${DRIVER_PORT:-8082}:8082"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - taxi-public

  backend-migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runner
    profiles: ["tools"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *backend-env
    command: ["npx", "prisma", "migrate", "deploy"]
    networks:
      - taxi-private

  backend-seed:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runner
    profiles: ["tools"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      backend-migrate:
        condition: service_completed_successfully
    environment:
      <<: *backend-env
    command: ["npx", "prisma", "db", "seed"]
    networks:
      - taxi-private

networks:
  taxi-public:
    driver: bridge
  taxi-private:
    driver: bridge
    internal: false

volumes:
  postgres-data:
  redis-data:
